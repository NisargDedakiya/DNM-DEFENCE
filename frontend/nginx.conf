server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in error pages / headers.
    server_tokens off;

    # Reasonable upload ceiling for APK/firmware/log uploads (MOB-1, IOT-1,
    # DFIR-2) -- matches the API's own 5MB body cap plus multipart overhead.
    client_max_body_size 10m;

    # The API runs as a separate service. Proxy every /api call to it so the
    # browser only ever talks to one origin (no CORS, no separate API host to
    # configure). "api" is the compose service name.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # some scan-trigger/report endpoints are slow
    }

    # Health endpoint passthrough (handy for uptime checks against the web tier).
    location = /health {
        proxy_pass http://api:8000/health;
    }

    # SPA: every non-file route falls back to index.html so client-side
    # routing (React Router) works on deep links / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted build assets; never cache index.html so a
    # redeploy is picked up immediately.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
